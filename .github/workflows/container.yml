name: Container Image

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-test-publish:
    name: Build, Validate, and Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run unit tests
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          pytest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=sha-${{ github.sha }}
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag

      - name: Build Docker test target
        uses: docker/build-push-action@v7
        with:
          context: .
          target: test
          load: true
          tags: sudoku-vision:test

      - name: Build runtime image for validation
        uses: docker/build-push-action@v7
        with:
          context: .
          target: runtime
          load: true
          tags: sudoku-vision:ci
          build-args: |
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
            SOURCE_URL=${{ github.server_url }}/${{ github.repository }}

      - name: Validate runtime image
        run: docker run --rm sudoku-vision:ci python -m sudoku_vision.cli health

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish runtime image to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: .
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
            SOURCE_URL=${{ github.server_url }}/${{ github.repository }}

      - name: Verify pushed GHCR image
        if: github.event_name != 'pull_request'
        run: |
          docker pull ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
          docker run --rm ghcr.io/${{ github.repository }}:sha-${{ github.sha }} python -m sudoku_vision.cli health
